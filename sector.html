<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>族群資金流向 · 泡泡圖</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'PingFang TC','Microsoft JhengHei',system-ui,sans-serif;
    background:#0e1218;color:#e8e8e8;
    display:flex;flex-direction:column;padding:16px;gap:10px;
  }
  h1{font-size:24px;font-weight:600;margin-bottom:2px;}
  .sub{font-size:14px;color:#888;}

  /* Main layout: stats on left, chart on right */
  .main-layout{display:flex;gap:10px;flex:1;min-height:0;}
  .stats-col{display:flex;flex-direction:column;gap:8px;width:170px;flex-shrink:0;}

  /* Top bar: offset by stats-col width so it sits above the chart only */
  .top-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-left:calc(170px + 10px);}

  /* Filter buttons */
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-left:auto;}
  .filter-btn{
    display:flex;align-items:center;gap:5px;
    padding:5px 10px;border-radius:20px;border:1.5px solid transparent;
    font-size:13px;cursor:pointer;user-select:none;white-space:nowrap;
    background:#1a2030;color:#666;transition:all .2s;
  }
  .filter-btn.active{color:#e8e8e8;border-color:var(--c);}
  .filter-btn.active .fdot{opacity:1;}
  .filter-btn:hover{color:#aaa;}
  .fdot{width:10px;height:10px;border-radius:50%;background:var(--c);opacity:0.4;transition:opacity .2s;}

  /* Search box */
  .search-wrap{position:relative;}
  .search-input{
    background:#1a2030;border:1px solid #2a3344;border-radius:20px;
    color:#e8e8e8;font-size:13px;padding:5px 14px 5px 32px;
    outline:none;width:240px;transition:border-color .2s,width .2s;
  }
  .search-input:focus{border-color:#3a5070;width:300px;}
  .search-input::placeholder{color:#555;}
  .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#555;font-size:13px;pointer-events:none;}
  .search-dropdown{
    position:absolute;top:calc(100% + 4px);right:0;
    background:#1c222c;border:1px solid #2f3a4a;border-radius:10px;
    min-width:230px;max-height:260px;overflow-y:auto;z-index:50;
    display:none;box-shadow:0 8px 24px rgba(0,0,0,.55);
  }
  .search-dropdown::-webkit-scrollbar{width:4px;}
  .search-dropdown::-webkit-scrollbar-thumb{background:#2a3344;border-radius:2px;}
  .search-dropdown.show{display:block;}
  .search-item{
    padding:8px 14px;font-size:13px;cursor:pointer;
    border-bottom:1px solid #1a2030;
    display:flex;align-items:center;gap:8px;color:#aaa;
  }
  .search-item:last-child{border-bottom:none;}
  .search-item:hover,.search-item.active-item{background:#232b3a;color:#e8e8e8;}
  .search-item-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .search-item-tag{
    font-size:11px;padding:1px 6px;border-radius:4px;
    background:#2a3344;color:#888;flex-shrink:0;
    max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }

  /* Bubble pulse animation */
  @keyframes bubblePulse{
    0%  {transform:scale(1);}
    25% {transform:scale(2.1);}
    55% {transform:scale(1.4);}
    75% {transform:scale(1.75);}
    100%{transform:scale(1);}
  }
  .bubble.pulse circle{
    transition:none !important;
    animation:bubblePulse 0.9s cubic-bezier(.34,1.56,.64,1) forwards;
  }

  /* Chart */
  .chart-wrap{background:#161b24;border:1px solid #222a36;border-radius:14px;padding:16px;position:relative;overflow:hidden;}
  svg{display:block;position:absolute;top:16px;left:16px;width:calc(100% - 32px);height:calc(100% - 32px);cursor:default;}
  svg.dragging{cursor:grabbing;}
  .zoom-hint{position:absolute;bottom:10px;right:14px;font-size:12px;color:#444;pointer-events:none;user-select:none;}
  .zoom-reset{position:absolute;top:10px;right:14px;background:#1a2030;border:1px solid #2a3344;border-radius:6px;color:#aaa;font-size:11px;padding:3px 8px;cursor:pointer;z-index:10;opacity:0.35;transition:opacity .2s;}
  .zoom-reset.active{opacity:1;}
  .zoom-reset:hover{color:#fff;}
  .fullscreen-btn{position:absolute;bottom:10px;left:14px;background:#1a2030;border:1px solid #2a3344;border-radius:6px;color:#888;font-size:13px;padding:4px 9px;cursor:pointer;z-index:10;display:none;line-height:1;}
  .fullscreen-btn:hover{color:#ccc;}
  @media (max-width:768px),(max-height:500px){.fullscreen-btn{display:block;}}
  .chart-wrap.chart-fullscreen{position:fixed !important;inset:0 !important;z-index:200 !important;border-radius:0 !important;height:100dvh !important;width:100dvw !important;}

  .axis-label{fill:#888;font-size:16px;}
  .quad-label{fill:#666;font-size:16px;font-weight:700;letter-spacing:.08em;}
  .grid-line{stroke:#1d2532;stroke-width:0.5;stroke-dasharray:2,3;}

  .bubble{cursor:pointer;}
  .bubble circle{transition:transform .25s cubic-bezier(.34,1.56,.64,1), fill-opacity .25s, stroke-width .25s; transform-origin:center; transform-box:fill-box;}
  .bubble:hover circle,.bubble.highlight circle{transform:scale(1.3); fill-opacity:0.8; stroke-width:2.5;}
  .bubble:hover,.bubble.highlight{filter:drop-shadow(0 0 10px rgba(255,255,255,0.12));}
  .bubble-label{fill:#fff;font-weight:700;pointer-events:none;text-anchor:middle;}
  .bubble-pct{fill:#fff;pointer-events:none;text-anchor:middle;opacity:0.9;}
  .bubble-chg{fill:#fff;pointer-events:none;text-anchor:middle;opacity:0;transition:opacity .2s;}
  .bubble:hover .bubble-chg{opacity:0.85;}

  /* Tooltip */
  .tooltip{
    position:absolute;background:#1c222c;border:1px solid #2f3a4a;
    border-radius:10px;padding:14px 16px;pointer-events:none;
    min-width:220px;font-size:13px;z-index:10;
    opacity:0;transition:opacity .15s;box-shadow:0 8px 28px rgba(0,0,0,.5);
  }
  .tt-name{font-size:17px;font-weight:700;margin-bottom:10px;color:#fff;}
  .tt-row{display:flex;justify-content:space-between;margin-bottom:5px;color:#aaa;}
  .tt-row strong{color:#fff;font-weight:600;}
  .tt-stocks{margin-top:10px;padding-top:8px;border-top:1px solid #2a3344;color:#777;font-size:12px;}
  .tt-status{display:inline-block;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;margin-top:8px;}

  /* Stock panel */
  .panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:201;opacity:0;pointer-events:none;transition:opacity .2s;}
  .panel-overlay.open{opacity:1;pointer-events:auto;}
  .stock-panel{
    position:fixed;background:#161b24;
    z-index:202;display:flex;flex-direction:column;
    transition:transform .25s cubic-bezier(.4,0,.2,1);
    box-shadow:-8px 0 32px rgba(0,0,0,.5);
  }
  .panel-head{padding:18px 16px 14px;border-bottom:1px solid #222a36;display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
  .panel-title{font-size:18px;font-weight:700;color:#fff;line-height:1.3;}
  .panel-badge{display:inline-block;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:700;margin-top:5px;}
  .panel-close{background:none;border:none;color:#555;font-size:20px;cursor:pointer;padding:0;line-height:1;flex-shrink:0;}
  .panel-close:hover{color:#aaa;}
  .panel-list{flex:1;overflow-y:auto;padding:8px 0;}
  .panel-list::-webkit-scrollbar{width:4px;}
  .panel-list::-webkit-scrollbar-track{background:transparent;}
  .panel-list::-webkit-scrollbar-thumb{background:#2a3344;border-radius:2px;}
  .panel-stats{padding:10px 16px 8px;border-bottom:1px solid #222a36;display:flex;flex-direction:column;gap:5px;}
  .panel-stat-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;}
  .panel-stat-label{color:#888;}
  .panel-stat-value{font-weight:600;}
  .stock-row{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid #1a2030;}
  .stock-code{font-size:14px;font-weight:700;color:#e8e8e8;min-width:44px;}
  .stock-name{font-size:14px;color:#aaa;flex:1;}
  .stock-chg{font-size:13px;font-weight:600;min-width:52px;text-align:right;}
  .stock-flow{font-size:12px;min-width:60px;text-align:right;color:#888;}

  .loading{text-align:center;padding:60px;color:#555;font-size:14px;}
  .error{text-align:center;padding:60px;color:#D85A30;font-size:14px;}

  /* Market drop banner（卡片樣式，放在 stats-col 底部）*/
  .market-banner{
    background:linear-gradient(135deg,#3a1f15 0%,#2a1810 100%);
    border:1px solid #6b3424;border-radius:10px;
    padding:10px 14px;font-size:13px;color:#ffaa88;
    cursor:pointer;transition:background .15s;
    display:flex;flex-direction:column;gap:6px;
  }
  .market-banner:hover{background:linear-gradient(135deg,#4a2818 0%,#3a1f15 100%);}
  .market-banner-top{display:flex;align-items:center;gap:6px;}
  .market-banner-icon{font-size:18px;flex-shrink:0;}
  .market-banner-title{font-size:12px;color:#ffaa88;font-weight:600;flex:1;}
  .market-banner-body{font-size:12px;color:#888;line-height:1.5;}
  .market-banner-body strong{color:#fff;}
  .market-banner-cta{font-size:12px;color:#E4B125;font-weight:600;}

  /* Ranking tabs */
  .ranking-tabs{display:flex;gap:6px;margin-bottom:12px;border-bottom:1px solid #1a2030;padding-bottom:0;}
  .ranking-tab{
    background:none;border:none;color:#666;font-size:14px;
    padding:8px 12px;cursor:pointer;position:relative;
    transition:color .15s;
  }
  .ranking-tab:hover{color:#aaa;}
  .ranking-tab.active{color:#e8e8e8;}
  .ranking-tab.active::after{
    content:'';position:absolute;bottom:-1px;left:0;right:0;
    height:2px;background:#1D9E75;
  }
  .ranking-tab.tab-bottom.active::after{background:#E4B125;}
  .empty-state{padding:40px 20px;text-align:center;color:#555;font-size:13px;}

  /* View toggle button */
  .view-toggle{position:absolute;top:10px;left:14px;display:flex;gap:4px;z-index:10;}
  .view-btn{background:#1a2030;border:1px solid #2a3344;border-radius:6px;color:#666;font-size:13px;padding:3px 10px;cursor:pointer;transition:all .2s;}
  .view-btn.active{color:#e8e8e8;border-color:#3a5070;background:#1e2a3a;}
  .view-btn:hover{color:#aaa;}

  /* Grouping toggle (題材 / 官方產業) */
  .grouping-toggle{display:flex;gap:0;background:#1a2030;border:1px solid #2a3344;border-radius:8px;overflow:hidden;flex-shrink:0;}
  .grp-btn{background:transparent;border:none;color:#888;font-size:13px;padding:5px 12px;cursor:pointer;transition:all .15s;white-space:nowrap;}
  .grp-btn:hover{color:#ccc;}
  .grp-btn.active{background:#2d6cdf;color:#fff;font-weight:600;}

  /* Chart controls (回看期間 + 軌跡) */
  .chart-controls{display:flex;align-items:center;gap:14px;}
  .ctrl-label{font-size:12px;color:#888;display:flex;align-items:center;gap:6px;}
  .inline-select{background:#1a2030;border:1px solid #2a3344;border-radius:6px;color:#e8e8e8;font-size:12px;padding:4px 8px;outline:none;cursor:pointer;}
  .ctrl-toggle{font-size:12px;color:#888;display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none;}
  .ctrl-toggle input{accent-color:#3a8fd8;cursor:pointer;}
  .topn-range{width:96px;accent-color:#3a8fd8;cursor:pointer;vertical-align:middle;}
  .topn-val{min-width:36px;color:#9fb2c8;font-variant-numeric:tabular-nums;font-size:12px;}

  /* Heatmap / Treemap / Map / Strength shared wrap */
  .heatmap-wrap,.treemap-wrap,.map-wrap,.strength-wrap{position:absolute;inset:16px;overflow:auto;display:none;}
  .heatmap-wrap::-webkit-scrollbar,.treemap-wrap::-webkit-scrollbar,.map-wrap::-webkit-scrollbar,.strength-wrap::-webkit-scrollbar{width:5px;height:5px;}
  .heatmap-wrap::-webkit-scrollbar-thumb,.treemap-wrap::-webkit-scrollbar-thumb,.map-wrap::-webkit-scrollbar-thumb,.strength-wrap::-webkit-scrollbar-thumb{background:#2a3344;border-radius:2px;}

  /* 強勢視圖 */
  .str-disclaimer{font-size:12px;color:#666;margin-bottom:10px;padding:8px 12px;background:#1a2030;border-radius:8px;border-left:3px solid #e0a93a;line-height:1.5;}
  .str-winbar{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap;}
  .str-lbl{color:#888;font-size:12px;margin-right:2px;}
  .str-win-btn,.str-mode-btn,.str-n-btn{background:#1a2030;border:1px solid #2a3344;border-radius:6px;color:#888;font-size:12px;padding:4px 11px;cursor:pointer;}
  .str-win-btn.active,.str-mode-btn.active,.str-n-btn.active{background:#2d6cdf;color:#fff;font-weight:600;border-color:#2d6cdf;}
  .str-market{margin-left:8px;font-size:12px;color:#888;}
  .str-stk-ind{font-size:12px;color:#7e8a99;min-width:96px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .str-stk-head{border-bottom:1px solid #222a36;color:#555;font-size:11px;}
  .str-stk-head span{color:#555 !important;}
  .str-ind{border-bottom:1px solid #1a2030;}
  .str-ind-head{display:flex;align-items:center;gap:10px;padding:9px 6px;cursor:pointer;border-radius:6px;}
  .str-ind-head:hover{background:#1a2030;}
  .str-rank{font-size:12px;color:#555;min-width:24px;text-align:right;}
  .str-ind-name{font-size:14px;color:#e8e8e8;min-width:120px;flex-shrink:0;}
  .str-ind-rs{font-size:14px;font-weight:700;min-width:60px;text-align:right;font-variant-numeric:tabular-nums;}
  .str-bar-wrap{flex:1;height:5px;background:#1a2030;border-radius:3px;overflow:hidden;max-width:260px;}
  .str-bar{height:5px;border-radius:3px;}
  .str-ind-flow{font-size:12px;color:#888;min-width:74px;text-align:right;}
  .str-stocks{padding:2px 0 8px 34px;}
  .str-stk{display:flex;align-items:center;gap:10px;padding:5px 8px;font-size:13px;border-bottom:1px solid #161b24;}
  .str-stk-code{color:#cfd6e0;font-weight:600;min-width:44px;}
  .str-stk-name{color:#9aa6b4;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .str-stk-chg{min-width:60px;text-align:right;font-variant-numeric:tabular-nums;}
  .str-stk-rs{min-width:70px;text-align:right;font-variant-numeric:tabular-nums;}
  .str-tag{font-size:11px;padding:1px 6px;border-radius:4px;min-width:52px;text-align:center;}
  .str-tag.real{background:#13361f;color:#5fd68a;}
  .str-tag.fake{background:#3a2a12;color:#e0a93a;}

  /* 熱力圖（色塊地圖） */
  .map-disclaimer{font-size:12px;color:#555;margin-bottom:10px;padding:8px 12px;background:#1a2030;border-radius:8px;border-left:3px solid #3a8fd8;}
  .map-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(116px,1fr));gap:5px;}
  .map-tile{border-radius:6px;padding:9px 10px;cursor:pointer;min-height:54px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid rgba(0,0,0,.25);transition:filter .15s,transform .1s;}
  .map-tile:hover{filter:brightness(1.25);transform:translateY(-1px);}
  .map-tile-name{font-size:12px;color:#eef2f6;font-weight:600;line-height:1.2;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
  .map-tile-val{font-size:13px;color:#fff;font-weight:700;font-variant-numeric:tabular-nums;margin-top:4px;}

  /* Heatmap grid */
  .hm-table{border-collapse:separate;border-spacing:2px;width:100%;}
  .hm-table th{font-size:11px;color:#777;font-weight:600;padding:4px 6px;text-align:right;white-space:nowrap;position:sticky;top:0;background:#161b24;z-index:2;}
  .hm-table th.hm-name-h{text-align:left;left:0;z-index:3;}
  .hm-row{cursor:pointer;}
  .hm-row:hover .hm-name{color:#fff;}
  .hm-name{font-size:13px;color:#cfd6e0;padding:5px 8px;white-space:nowrap;position:sticky;left:0;background:#161b24;text-align:left;max-width:160px;overflow:hidden;text-overflow:ellipsis;}
  .hm-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle;}
  .hm-cell{font-size:12px;text-align:right;padding:5px 8px;border-radius:4px;color:#e8e8e8;font-variant-numeric:tabular-nums;white-space:nowrap;}
  .hm-disclaimer{font-size:12px;color:#555;margin-bottom:10px;padding:8px 12px;background:#1a2030;border-radius:8px;border-left:3px solid #3a8fd8;}

  /* Treemap */
  .tm-canvas{position:relative;width:100%;}
  .tm-tile{position:absolute;border-radius:5px;overflow:hidden;cursor:pointer;border:1px solid rgba(0,0,0,.35);display:flex;flex-direction:column;justify-content:center;align-items:center;padding:4px;transition:filter .15s;}
  .tm-tile:hover{filter:brightness(1.25);}
  .tm-name{font-weight:700;color:#fff;text-align:center;line-height:1.15;overflow:hidden;}
  .tm-val{color:rgba(255,255,255,.9);margin-top:2px;}
  .tm-disclaimer{font-size:12px;color:#555;margin-bottom:10px;padding:8px 12px;background:#1a2030;border-radius:8px;border-left:3px solid #1D9E75;}

  /* Ranking list */
  .ranking-wrap{position:absolute;inset:16px;overflow-y:auto;display:none;}
  .ranking-wrap::-webkit-scrollbar{width:4px;}
  .ranking-wrap::-webkit-scrollbar-thumb{background:#2a3344;border-radius:2px;}
  .ranking-disclaimer{font-size:12px;color:#555;margin-bottom:12px;padding:8px 12px;background:#1a2030;border-radius:8px;border-left:3px solid #E4B125;line-height:1.5;}
  .rank-level{display:flex;align-items:center;gap:6px;margin-bottom:10px;}
  .rank-level-btn{background:#1a2030;border:1px solid #2a3344;border-radius:6px;color:#888;font-size:12px;padding:3px 12px;cursor:pointer;}
  .rank-level-btn.active{background:#2d6cdf;color:#fff;font-weight:600;border-color:#2d6cdf;}
  .ranking-col-header{display:flex;align-items:center;gap:10px;padding:2px 4px 6px;border-bottom:1px solid #1a2030;margin-bottom:2px;}
  .ranking-col-header-name{flex:1;}
  .ranking-col-header-chg{font-size:10px;color:#555;min-width:54px;text-align:right;}
  .ranking-col-header-flow{font-size:10px;color:#555;min-width:calc(68px + 10px + 72px);flex-shrink:0;text-align:center;}
  .ranking-item{display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid #1a2030;cursor:pointer;transition:background .15s;border-radius:6px;}
  .ranking-item:hover{background:#1a2030;}
  .ranking-item:last-child{border-bottom:none;}
  .ranking-rank{font-size:12px;color:#444;min-width:22px;text-align:right;}
  .ranking-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .ranking-name{font-size:14px;color:#e8e8e8;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .ranking-chg{font-size:14px;font-weight:600;min-width:54px;text-align:right;}
  .ranking-flow{font-size:12px;color:#666;min-width:68px;text-align:right;}
  .ranking-bar-wrap{width:72px;flex-shrink:0;}
  .ranking-bar-bg{height:4px;background:#1a2030;border-radius:2px;overflow:hidden;}
  .ranking-bar-fill{height:4px;border-radius:2px;transition:width .3s;}
  .ranking-flow-col{display:flex;align-items:center;gap:10px;flex-shrink:0;}
  @media(max-width:768px){
    .ranking-col-header-flow{min-width:60px;text-align:right;}
    .ranking-flow-col{flex-direction:column;align-items:flex-end;gap:4px;min-width:60px;}
    .ranking-flow{min-width:unset;font-size:11px;}
    .ranking-bar-wrap{width:60px;}
  }
  .overlap-menu{
    position:absolute;background:#1c222c;border:1px solid #2f3a4a;
    border-radius:12px;z-index:30;min-width:200px;max-width:260px;
    box-shadow:0 8px 28px rgba(0,0,0,.6);overflow:hidden;
    animation:fadeInUp .15s ease;
    display:flex;flex-direction:column;
  }
  .overlap-menu-list{
    overflow-y:auto;max-height:320px;
  }
  .overlap-menu-list::-webkit-scrollbar{width:4px;}
  .overlap-menu-list::-webkit-scrollbar-thumb{background:#2a3344;border-radius:2px;}
  @keyframes fadeInUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .overlap-menu-header{
    padding:8px 14px 6px;font-size:11px;color:#555;
    text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid #1a2030;
  }
  .overlap-menu-item{
    display:flex;align-items:center;gap:10px;
    padding:10px 14px;cursor:pointer;border-bottom:1px solid #1a2030;
    transition:background .15s;
  }
  .overlap-menu-item:last-child{border-bottom:none;}
  .overlap-menu-item:hover{background:#232b3a;}
  .overlap-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .overlap-name{font-size:14px;color:#e8e8e8;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .overlap-val{font-size:12px;flex-shrink:0;}

// 依目前回看窗格設定每族群的 _x（X 軸值＝該窗格淨買超）/ _accel（Y 軸值＝該窗格加速度）。泡泡大小固定 |net20|。
function prepWindow(s) {
  const W = lookbackWin;
  s._x = (s[WIN_NET[W]] != null) ? s[WIN_NET[W]] : s.net_5d_yi;
  s._accel = (s[WIN_ACC[W]] != null) ? s[WIN_ACC[W]] : s.accel;
}

// 從 120 日累積序列 cum 取「最近 days 天」的累積（減基準歸零）→ 任意天數窗
function windowedCum(cum, days) {
  if (!cum || cum.length < 2) return [];
  const L = cum.length, n = Math.min(Math.max(2, days), L);
  const base = (L - n - 1 >= 0) ? cum[L - n - 1] : 0;
  return cum.slice(L - n).map(v => v - base);
}

// 累積淨買超 sparkline（傳入已取窗的陣列）
function cumSparkline(cum) {
  if (!cum || cum.length < 2) return '';
  const W = 256, H = 64, pad = 4;
  const mn = Math.min(0, ...cum), mx = Math.max(0, ...cum);
  const rng = (mx - mn) || 1;
  const X = i => pad + i / (cum.length - 1) * (W - 2 * pad);
  const Y = v => H - pad - (v - mn) / rng * (H - 2 * pad);
  const pts = cum.map((v, i) => `${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(' ');
  const last = cum[cum.length - 1];
  const col = last >= 0 ? '#1D9E75' : '#D85A30';
  const z = Y(0).toFixed(1);
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="display:block;position:static;width:100%;height:60px;margin-top:3px">
    <line x1="${pad}" x2="${W - pad}" y1="${z}" y2="${z}" stroke="#2a3344" stroke-width="1" stroke-dasharray="2,2"/>
    <polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.8" vector-effect="non-scaling-stroke"/>
    <circle cx="${X(cum.length - 1).toFixed(1)}" cy="${Y(last).toFixed(1)}" r="2.6" fill="${col}"/>
  </svg>`;
}

function applyFilter() {
  document.querySelectorAll('.bubble').forEach(b => {
    b.style.display = activeCats.has(b.dataset.cat) ? '' : 'none';
  });
  document.querySelectorAll('.cat-card').forEach(card => {
    card.classList.toggle('inactive', !activeCats.has(card.dataset.cat));
  });

  if (!zoomController || !chartLayout) return;
  const { W, H, PAD, innerW, innerH, gx, gy, xMin, xMax, yMin, yMax } = chartLayout;

  // Reset zoom when all filters are on
  if (activeCats.size === 4) {
    zoomController.setTransform(0, 0, 1);
    return;
  }

  // Auto-zoom only for single filter
  if (activeCats.size !== 1) return;

  const cat = [...activeCats][0];

  // X: quadrant boundary (positive X for green/yellow, negative for red/gray)
  const svgL = gx(cat === 'green' || cat === 'yellow' ? 0 : xMin);
  const svgR = gx(cat === 'green' || cat === 'yellow' ? xMax : 0);

  // Y: actual bubble bounding box so we don't include empty chart space
  const visibleBubbles = [...document.querySelectorAll('.bubble')].filter(b => b.style.display !== 'none');
  if (!visibleBubbles.length) return;
  let svgT = Infinity, svgB = -Infinity;
  visibleBubbles.forEach(b => {
    const c = b.querySelector('circle');
    const cy = +c.getAttribute('cy'), r = +c.getAttribute('r');
    svgT = Math.min(svgT, cy - r);
    svgB = Math.max(svgB, cy + r);
  });

  const MARGIN = 12;
  const newScale = Math.min(innerW / (svgR - svgL + MARGIN * 2), innerH / (svgB - svgT + MARGIN * 2), 5);
  const newTx = (PAD.l + innerW / 2) - ((svgL + svgR) / 2) * newScale;
  const newTy = (PAD.t + innerH / 2) - ((svgT + svgB) / 2) * newScale;

  zoomController.setTransform(newTx, newTy, newScale);
}

async function fetchTWSEStockData(date) {
  function toD(s) { return s.replace(/-/g, ''); }
  function prevDay(dateStr) {
    const [y, m, d] = dateStr.split('-').map(Number);
    const dt = new Date(y, m - 1, d - 1);
    return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
  }
  async function getPrice(dateStr) {
    const j = await fetch(`https://www.twse.com.tw/rwd/zh/afterTrading/STOCK_DAY_ALL?response=json&date=${toD(dateStr)}`).then(r=>r.json());
    return j.data || [];
  }
  async function getChip(dateStr) {
    const j = await fetch(`https://www.twse.com.tw/rwd/zh/fund/T86?response=json&date=${toD(dateStr)}&selectType=ALL`).then(r=>r.json());
    return j.data || [];
  }

  try {
    // Price and chip fall back independently — chip (T86) is only available after market close
    let [priceRows, chipRows] = await Promise.all([getPrice(date), getChip(date)]);
    const prev = prevDay(date);
    if (priceRows.length === 0) priceRows = await getPrice(prev);
    if (chipRows.length  === 0) chipRows  = await getChip(prev);
    if (priceRows.length === 0) return null;

    // Price map: code → { close, chg_1d% }
    // STOCK_DAY_ALL: [代號, 名稱, 成交股數, 成交金額, 開盤, 最高, 最低, 收盤, 漲跌價差, 成交筆數]
    const priceMap = {};
    priceRows.forEach(row => {
      const code  = (row[0] || '').trim();
      const close = parseFloat((row[7] || '').replace(/,/g, ''));
      const diff  = parseFloat((row[8] || '0').replace(/,/g, ''));
      if (!code || isNaN(close) || isNaN(diff)) return;
      const prev = close - diff;
      priceMap[code] = { close, chg_1d: prev > 0 ? diff / prev * 100 : 0 };
    });

    // Chip map: code → 三大法人買賣超(股數)  [T86 field index 18]
    const chipMap = {};
    chipRows.forEach(row => {
      const code = (row[0] || '').trim();
      const net  = parseFloat((row[18] || '0').replace(/,/g, ''));
      if (code && !isNaN(net)) chipMap[code] = net;
    });

    const stockData = {};
    Object.keys(STOCK_NAMES).forEach(code => {
      const p = priceMap[code];
      if (!p) return;
      const net = chipMap[code] != null ? chipMap[code] : 0;
      stockData[code] = {
        chg_1d:    parseFloat(p.chg_1d.toFixed(2)),
        net_1d_yi: parseFloat((net * p.close / 1e8).toFixed(2))
      };
    });
    return Object.keys(stockData).length > 0 ? stockData : null;
  } catch (e) {
    return null;
  }
}

async function init() {

function classify(s) {
  // 依目前回看窗格的 _x/_accel（prepWindow 設定）分四象限；未 prep 時退回 5 日值
  const x = (s._x != null) ? s._x : s.net_5d_yi;
  const a = (s._accel != null) ? s._accel : s.accel;
  if (x > 0 && a > 0) return 'green';
  if (x > 0 && a <= 0) return 'yellow';
  if (x <= 0 && x > -0.5) return 'gray';
  return 'red';
}

function statusLabel(c) {
  return { green:'主力', yellow:'輪動', gray:'觀望', red:'退潮' }[c];
}

      const lbl = document.getElementById('curve-days-lbl');
      if (lbl) lbl.textContent = Math.min(curveDays, s.cum.length);
      const tot = document.getElementById('curve-total');
      if (tot) { tot.textContent = `${last >= 0 ? '+' : ''}${last} 億`; tot.style.color = last >= 0 ? '#1D9E75' : '#D85A30'; }
      const sp = document.getElementById('curve-spark');
      if (sp) sp.innerHTML = cumSparkline(wc);
    });
  }
}

function setupSearch(sectors) {
  const searchInput = document.getElementById('search-input');
  const searchDropdown = document.getElementById('search-dropdown');

  function showDropdown(results, query) {
    if (!results.length) {
      searchDropdown.innerHTML = `
        <div style="padding:12px 14px 8px;border-bottom:1px solid #1a2030;">
          <div style="font-size:12px;color:#aaa;margin-bottom:2px;">找不到「${query.trim()}」的板塊資料</div>
          <div style="font-size:11px;color:#555;">目前分類共 ${(allSectors||[]).length} 個族群</div>
        </div>
      `;
      searchDropdown.classList.add('show');
      return;
    }
    searchDropdown.innerHTML = results.map(r =>
      `<div class="search-item" data-sector="${r.sector}">
        <span class="search-item-name">${r.label}</span>
        <span class="search-item-tag">${r.tag}</span>
      </div>`
    ).join('');
    searchDropdown.classList.add('show');
    searchDropdown.querySelectorAll('.search-item').forEach(item => {
      item.addEventListener('mousedown', e => {
        e.preventDefault();
        const sectorName = item.dataset.sector;
        searchInput.value = '';
        searchDropdown.classList.remove('show');
        document.querySelectorAll('.bubble.highlight').forEach(b => b.classList.remove('highlight'));
        triggerSector(sectorName);
      });
      item.addEventListener('mouseenter', () => {
        document.querySelectorAll('.bubble.highlight').forEach(b => b.classList.remove('highlight'));
        const sectorName = item.dataset.sector;
        document.querySelectorAll('.bubble').forEach(b => {
          if (allSectors && allSectors[+b.dataset.i]?.name === sectorName) {
            b.classList.add('highlight');
          }
        });
      });
      item.addEventListener('mouseleave', () => {
        document.querySelectorAll('.bubble.highlight').forEach(b => b.classList.remove('highlight'));
      });
    });
  }

  function doSearch(query) {
    const q = query.trim().toLowerCase();
    if (!q) { searchDropdown.classList.remove('show'); return; }
    const list = allSectors || [];
    const sd = (lastRenderData && lastRenderData.stock_data) || {};
    const results = [];
    const seen = new Set();

    // Match sector names（目前分類）
    list.forEach(s => {
      if (s.name.toLowerCase().includes(q) && !seen.has(s.name)) {
        seen.add(s.name);
        results.push({ sector: s.name, label: s.name, tag: '族群' });
      }
    });

    // Match stock code or name → 浮出目前分類下的所屬族群
    list.forEach(s => {
      (s.stocks || []).forEach(code => {
        const nm = (sd[code] && sd[code].name) || STOCK_NAMES[code] || '';
        if (code.includes(q) || nm.toLowerCase().includes(q) || (nm && nm.includes(query.trim()))) {
          const key = code + '|' + s.name;
          if (!seen.has(key)) {
            seen.add(key);
            results.push({ sector: s.name, label: `${code} ${nm}`, tag: s.name });
          }
        }
      });
    });

    showDropdown(results.slice(0, 12), query);
  }

  function triggerSector(sectorName) {
    const bubbles = document.querySelectorAll('.bubble');
    let targetBubble = null;
    bubbles.forEach(b => {
      if (allSectors[+b.dataset.i]?.name === sectorName) targetBubble = b;
    });
    if (!targetBubble) {   // 被 Top-N 隱藏或非泡泡視圖：直接開面板
      const s = (allSectors || []).find(x => x.name === sectorName);
      if (s) openPanel(s);
      return;
    }

    // Show the bubble's category if it was filtered out
    const cat = targetBubble.dataset.cat;
    if (!activeCats.has(cat)) {
      activeCats.add(cat);
      const btn = document.querySelector(`.filter-btn[data-cat="${cat}"]`);
      if (btn) btn.classList.add('active');
      applyFilter();
    }

    // Pulse: remove class first to restart animation
    targetBubble.classList.remove('pulse');
    void targetBubble.offsetWidth;
    targetBubble.classList.add('pulse');

    // Open panel partway through the animation
    setTimeout(() => openPanel(allSectors[+targetBubble.dataset.i]), 450);
    setTimeout(() => targetBubble.classList.remove('pulse'), 1000);
  }

  searchInput.addEventListener('input', () => doSearch(searchInput.value));
  searchInput.addEventListener('blur', () =>
    setTimeout(() => searchDropdown.classList.remove('show'), 180)
  );
  searchInput.addEventListener('keydown', e => {
    if (e.key === 'Escape') { searchInput.value = ''; searchDropdown.classList.remove('show'); }
  });
}

function render(data) {
  lastRenderData = data;

  // ⚓ Demo mode：注入假的抄底資料給 2 個板塊，並補全 net_1d_yi 讓 UI 可預覽
  if (DEMO_BOTTOM_FISHING) {
    data.market_chg_1d = -1.85;
    data.is_market_down = true;
    const sectorsList = data.sectors || [];
    // 所有板塊補上模擬當日買超（= 5日均值 * 隨機係數，保留正負方向）
    sectorsList.forEach(s => {
      if (s.net_1d_yi == null) {
        s.net_1d_yi = parseFloat((s.net_5d_yi / 5 * (0.6 + Math.random() * 0.8)).toFixed(2));
        s.chg_1d = parseFloat((s.chg_5d / 5 * (0.5 + Math.random())).toFixed(2));
      }
    });
    // 隨便挑兩個有在 SECTOR_STOCKS 的板塊塞假抄底資料
    const candidates = sectorsList.filter(s => SECTOR_STOCKS[s.name]).slice(0, 2);
    if (candidates[0]) {
      candidates[0].chg_1d = -2.4;
      candidates[0].net_1d_yi = 18.6;
      candidates[0].is_bottom_fishing = true;
      candidates[0].bottom_score = 7.75;
    }
    if (candidates[1]) {
      candidates[1].chg_1d = -1.2;
      candidates[1].net_1d_yi = 9.3;
      candidates[1].is_bottom_fishing = true;
      candidates[1].bottom_score = 7.75;
    }
  }

  document.getElementById('loading').style.display = 'none';
  document.getElementById('chart').style.display = 'block';
  const updatedAt = new Date(data.updated_at + 'Z');
  const twStr = updatedAt.toLocaleString('zh-TW', {
    timeZone: 'Asia/Taipei', year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', hour12: false
  });
  document.getElementById('update-info').innerHTML =
    `資料日期：${data.date}　｜　最後更新：${twStr}（台灣時間）`;

  const groupings = data.groupings || {};
  const gkeys = Object.keys(groupings);
  if (!groupings[currentGrouping]) currentGrouping = gkeys[0];
  const sectors = (groupings[currentGrouping] && groupings[currentGrouping].sectors) || [];
  allSectors = sectors;
  // 依資料重建分類切換鈕（事件用委派，見 static listeners）
  const gt = document.getElementById('grouping-toggle');
  if (gt) gt.innerHTML = gkeys.map(k =>
    `<button class="grp-btn ${k === currentGrouping ? 'active' : ''}" data-grp="${k}">${groupings[k].label}</button>`).join('');
  // Top-N 滑桿上限/標籤同步當前分類群數
  const _tr = document.getElementById('topn-range');
  if (_tr) {
    _tr.max = Math.max(10, sectors.length);
    _tr.value = Math.min(topN, sectors.length);
    const _tl = document.getElementById('topn-label');
    if (_tl) _tl.textContent = topN >= sectors.length ? '全部' : ('前 ' + topN);
  }

  // Fetch per-stock TWSE data in background if not already in JSON
  if (!data.stock_data) {
    fetchTWSEStockData(data.date).then(sd => {
      if (!sd) return;
      lastRenderData.stock_data = sd;
      // Refresh panel if open
      const panel = document.getElementById('stock-panel');
      if (panel.classList.contains('open')) {
        const title = document.getElementById('panel-title').textContent;
        const sector = allSectors.find(s => s.name === title);
        if (sector) openPanel(sector);
      }
    });
  }

  // Stats — accel 由後端提供（缺則前端補算）；再依回看窗格設 _x/_accel
  sectors.forEach(s => {
    if (s.accel == null) s.accel = (s.net_5d_yi / 5) - (s.net_20d_yi / 20);
    prepWindow(s);
  });
  // Top-N：依 |選定期間流入| 取前 N 顯示（泡泡圖去蕪存菁；其餘不畫，軸也只依顯示的縮放）
  const _limitN = Math.min(topN, sectors.length);
  const _ranked = sectors.map((s, i) => ({ i, m: Math.abs(s._x || 0) })).sort((a, b) => b.m - a.m);
  const showSet = new Set(_ranked.slice(0, _limitN).map(r => r.i));
  const catCounts = { green: 0, yellow: 0, gray: 0, red: 0 };
  sectors.forEach(s => { catCounts[classify(s)]++; });

  const CAT_META = [
    { cat: 'green',  color: '#1D9E75', label: '主力',  sub: '資金加速流入' },
    { cat: 'yellow', color: '#E4B125', label: '輪動',  sub: '資金流入但放緩' },
    { cat: 'gray',   color: '#777',    label: '觀望',  sub: '資金沉寂' },
    { cat: 'red',    color: '#D85A30', label: '退潮',  sub: '資金流出' },
  ];

  document.getElementById('stats-row').innerHTML = CAT_META.map(m => `
    <div class="stat-card cat-card ${activeCats.has(m.cat) ? '' : 'inactive'}"
         data-cat="${m.cat}" style="border-left-color:${m.color}">
      <div class="stat-label" style="color:${m.color};margin-bottom:2px">${m.label}</div>
      <div class="stat-value" style="color:${m.color}">${catCounts[m.cat]}</div>
      <div class="cat-card-sub">${m.sub}</div>
    </div>
  `).join('');

  // Chart dimensions — match the container's inner area
  const chartWrap = document.getElementById('chart-wrap');
  const padding = 16;
  const W = (chartWrap.clientWidth || 940 + padding * 2) - padding * 2;
  const H = (chartWrap.clientHeight || 580 + padding * 2) - padding * 2;
  const svg = document.getElementById('chart');
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  const PAD = { t:40, r:30, b:50, l:85 };
  const innerW = W - PAD.l - PAD.r;
  const innerH = H - PAD.t - PAD.b;

  const flows = sectors.filter((s, i) => showSet.has(i)).map(s => s._x);
  const accels = sectors.filter((s, i) => showSet.has(i)).map(s => s._accel);

  const rawXMin = Math.min(...flows), rawXMax = Math.max(...flows);
  const rawYMin = Math.min(...accels), rawYMax = Math.max(...accels);

  function niceStep(range, targetTicks) {
    const rough = range / targetTicks;
    const mag = Math.pow(10, Math.floor(Math.log10(rough)));
    const norm = rough / mag;
    const nice = norm < 1.5 ? 1 : norm < 3.5 ? 2 : norm < 7.5 ? 5 : 10;
    return nice * mag;
  }

  const xStep = niceStep(rawXMax - rawXMin || 1, 6);
  const xMin = Math.floor(rawXMin / xStep) * xStep - xStep * 0.3;
  const xMax = Math.ceil(rawXMax / xStep) * xStep + xStep * 0.3;

  const yPad = (rawYMax - rawYMin || 1) * 0.15;
  const yMin = rawYMin - yPad;
  const yMax = rawYMax + yPad;

  // Group-space coordinate mapping (before zoom transform)
  const gx = v => PAD.l + ((v - xMin) / (xMax - xMin)) * innerW;
  const gy = v => PAD.t + (1 - (v - yMin) / (yMax - yMin)) * innerH;
  chartLayout = { W, H, PAD, innerW, innerH, gx, gy, xMin, xMax, yMin, yMax };

  const abs20 = sectors.map(s => Math.abs(s.net_20d_yi));
  const max20 = Math.max(...abs20, 1);
  const sr = v => Math.max(16, Math.min(48, 16 + (v / max20) * 32));

  // 軌跡尾巴：5 日視圖才有 prev（5 個交易日前 → 現在的移動向量，看資金「往哪轉」）
  let trailsHtml = '';
  if (showTrails && lookbackWin === 5) {
    sectors.forEach((s, idx) => {
      if (!showSet.has(idx)) return;
      if (s.net_5d_prev_yi == null || s.accel_prev == null) return;
      const x0 = gx(s.net_5d_prev_yi), y0 = gy(s.accel_prev);
      const x1 = gx(s._x), y1 = gy(s._accel);
      if (Math.hypot(x1 - x0, y1 - y0) < 3) return;   // 幾乎沒動就不畫
      const col = COLORS[classify(s)];
      trailsHtml += `<line class="trail" x1="${x0}" y1="${y0}" x2="${x1}" y2="${y1}" stroke="${col}" stroke-width="1.4" stroke-opacity="0.30" stroke-linecap="round"/>` +
                    `<circle class="trail" cx="${x0}" cy="${y0}" r="2.2" fill="${col}" fill-opacity="0.26"/>`;
    });
  }

  // Build only bubbles (axes are drawn separately via redrawAxes)
  let bubblesHtml = '';
  sectors.forEach((s, i) => {
    if (!showSet.has(i)) return;
    const bx = gx(s._x);
    const by = gy(s._accel);
    const r = sr(Math.abs(s.net_20d_yi));
    const cat = classify(s);
    const color = COLORS[cat];
    const inflow = (cat === 'green' || cat === 'yellow');
    const fillOp = inflow ? 0.5 : 0.16;          // 流出族群空心化：避免「大紅泡泡＝強」的誤讀
    const dash = inflow ? '' : ' stroke-dasharray="3,3"';
    const sign = s._x >= 0 ? '+' : '';
    const fs1 = Math.max(10, Math.min(18, r * 0.38));
    const fs2 = Math.max(9, Math.min(16, r * 0.34));
    const fs3 = Math.max(8, Math.min(14, r * 0.30));
    const maxChars = Math.floor(r * 1.6 / fs1);
    const nameStr = s.name.length > maxChars ? s.name.slice(0, maxChars) + '…' : s.name;
    const chgSign = s.chg_5d >= 0 ? '+' : '';
    const chgColor = s.chg_5d >= 0 ? '#7ef5c8' : '#ffaa88';
    // 兩行（平常）置中
    const lineGap = 2;
    const twoLineHalf = (fs1 + lineGap + fs2) / 2;
    const y1 = by - twoLineHalf + fs1;
    const y2 = y1 + lineGap + fs2;
    const y3 = y2 + lineGap + fs3;
    // 黑馬金環（回測版：低基期被偷買，僅空頭 regime 後端才標 True）
    const ring = s.is_blackhorse
      ? `<circle cx="${bx}" cy="${by}" r="${r + 4}" fill="none" stroke="#E4B125" stroke-width="1.6" stroke-dasharray="3,3" opacity="0.9"/>` : '';

    bubblesHtml += `<g class="bubble" data-i="${i}" data-cat="${cat}">
      ${ring}
      <clipPath id="cp${i}"><circle cx="${bx}" cy="${by}" r="${r - 1}"/></clipPath>
      <circle cx="${bx}" cy="${by}" r="${r}" fill="${color}" fill-opacity="${fillOp}" stroke="${color}" stroke-width="1.5"${dash}/>
      <text class="bubble-label" clip-path="url(#cp${i})" font-size="${fs1}" x="${bx}" y="${y1}">${nameStr}</text>
      <text class="bubble-pct" clip-path="url(#cp${i})" font-size="${fs2}" x="${bx}" y="${y2}">${sign}${s._x.toFixed(1)}億</text>
      <text class="bubble-chg" clip-path="url(#cp${i})" font-size="${fs3}" x="${bx}" y="${y3}" fill="${chgColor}">${chgSign}${s.chg_5d.toFixed(1)}%</text>
    </g>`;
  });

  svg.innerHTML =
    `<defs><clipPath id="data-clip"><rect x="${PAD.l}" y="${PAD.t}" width="${innerW}" height="${innerH}"/></clipPath></defs>` +
    `<g id="grid-group"></g>` +
    `<g id="center-lines-group"></g>` +
    `<g id="zoom-group">${trailsHtml}${bubblesHtml}</g>` +
    `<g id="axis-labels-group"></g>` +
    `<g id="static-group">` +
      `<text class="axis-label" x="${W-PAD.r}" y="${H-PAD.b+46}" text-anchor="end">資金流入（億）→</text>` +
      `<text class="axis-label" x="${PAD.l}" y="${H-PAD.b+46}">← 資金流出（億）</text>` +
      `<text class="quad-label" x="${W-PAD.r-10}" y="${PAD.t+18}" text-anchor="end">主力加速流入 ⭐</text>` +
      `<text class="quad-label" x="${W-PAD.r-10}" y="${H-PAD.b-10}" text-anchor="end">流入但放緩</text>` +
      `<text class="quad-label" x="${PAD.l+10}" y="${PAD.t+18}">加速流出</text>` +
      `<text class="quad-label" x="${PAD.l+10}" y="${H-PAD.b-10}">低迷流出</text>` +
    `</g>`;

  // Redraw grid lines + axis tick labels to match current zoom
  function redrawAxes(tx, ty, zs) {
    // Screen-space position of a data value (accounts for zoom transform)
    const screenX = v => tx + gx(v) * zs;
    const screenY = v => ty + gy(v) * zs;

    // Visible data range derived from current transform
    const visXMin = xMin + ((PAD.l - tx) / zs - PAD.l) / innerW * (xMax - xMin);
    const visXMax = xMin + ((W - PAD.r - tx) / zs - PAD.l) / innerW * (xMax - xMin);
    const visYMax = yMin + (1 - ((PAD.t - ty) / zs - PAD.t) / innerH) * (yMax - yMin);
    const visYMin = yMin + (1 - ((H - PAD.b - ty) / zs - PAD.t) / innerH) * (yMax - yMin);

    const xTickStep = niceStep(visXMax - visXMin || 1, 6);
    const yTickStep = niceStep(visYMax - visYMin || 1, 5);

    let gridHtml = '', centerHtml = '', labelsHtml = '';

    // X axis ticks
    let xCount = 0;
    for (let v = Math.ceil(visXMin / xTickStep) * xTickStep; v <= visXMax + 1e-9 && xCount < 20; v = Math.round((v + xTickStep) * 1e6) / 1e6, xCount++) {
      const px = screenX(v);
      if (px < PAD.l - 1 || px > W - PAD.r + 1) continue;
      gridHtml += `<line class="grid-line" x1="${px}" x2="${px}" y1="${PAD.t}" y2="${H-PAD.b}"/>`;
      const absV = Math.abs(v);
      const label = absV < xTickStep * 0.01 ? '0' : (v > 0 ? '+' : '') + (absV >= 100 ? v.toFixed(0) : absV < 10 ? v.toFixed(1) : v.toFixed(0));
      labelsHtml += `<text class="axis-label" x="${px}" y="${H-PAD.b+16}" text-anchor="middle">${label}</text>`;
    }

    // Y axis ticks
    const yTicks = [];
    for (let v = Math.ceil(visYMin / yTickStep) * yTickStep; v <= visYMax + 1e-9 && yTicks.length < 20; v = Math.round((v + yTickStep) * 1e6) / 1e6) {
      yTicks.push(v);
    }
    const nearTop = yTicks.length && yTicks[yTicks.length - 1] >= yMax - yTickStep * 0.6;
    const nearBot = yTicks.length && yTicks[0] <= yMin + yTickStep * 0.6;
    yTicks.forEach((v, idx) => {
      const py = screenY(v);
      if (py < PAD.t - 1 || py > H - PAD.b + 1) return;
      gridHtml += `<line class="grid-line" x1="${PAD.l}" x2="${W-PAD.r}" y1="${py}" y2="${py}"/>`;
      let label;
      if (idx === yTicks.length - 1 && nearTop) label = '加速流入 ↑';
      else if (idx === 0 && nearBot) label = '加速流出 ↓';
      else { const sg = v >= 0 ? '+' : ''; label = sg + v.toFixed(1) + '億/天'; }
      labelsHtml += `<text class="axis-label" x="${PAD.l-6}" y="${py+4}" text-anchor="end">${label}</text>`;
    });

    // Center divider lines (x=0 and y=0 acceleration)
    const cx = screenX(0), cy = screenY(0);
    if (cx >= PAD.l && cx <= W - PAD.r)
      centerHtml += `<line x1="${cx}" x2="${cx}" y1="${PAD.t}" y2="${H-PAD.b}" stroke="#3a4556" stroke-width="1.5"/>`;
    if (cy >= PAD.t && cy <= H - PAD.b)
      centerHtml += `<line x1="${PAD.l}" x2="${W-PAD.r}" y1="${cy}" y2="${cy}" stroke="#3a4556" stroke-width="1.5"/>`;

    document.getElementById('grid-group').innerHTML = gridHtml;
    document.getElementById('center-lines-group').innerHTML = centerHtml;
    document.getElementById('axis-labels-group').innerHTML = labelsHtml;
  }

  redrawAxes(0, 0, 1);
  zoomController = setupZoom(svg, redrawAxes, (tx, ty, zs) => {
    const mX = innerW * (zs - 1) / 2;
    const mY = innerH * (zs - 1) / 2;
    return {
      tx: Math.min(PAD.l * (1 - zs) + mX, Math.max((W - PAD.r) * (1 - zs) - mX, tx)),
      ty: Math.min(PAD.t * (1 - zs) + mY, Math.max((H - PAD.b) * (1 - zs) - mY, ty))
    };
  });

  // Tooltip
  const tt = document.getElementById('tt');
  const wrap = chartWrap;

  document.querySelectorAll('.bubble').forEach(b => {
    b.addEventListener('mouseenter', () => {
      const s = sectors[+b.dataset.i];
      const cat = classify(s);
      const color = COLORS[cat];
      const statusBg = color + '25';
      const sign5 = s.net_5d_yi >= 0 ? '+' : '';
      const sign20 = s.net_20d_yi >= 0 ? '+' : '';
      const col5 = s.net_5d_yi >= 0 ? '#1D9E75' : '#D85A30';
      const col20 = s.net_20d_yi >= 0 ? '#1D9E75' : '#D85A30';
      const accelSign = s.accel >= 0 ? '+' : '';
      const accelCol = s.accel >= 0 ? '#1D9E75' : '#D85A30';
      const accelLabel = s.accel > 0.5 ? '強勢加速' : s.accel > 0 ? '緩步加速' : s.accel > -0.5 ? '略為放緩' : '明顯退潮';

      const isBottomFs = s.is_bottom_fishing;
      const signalBadge = isBottomFs
        ? `<span class="tt-status" style="background:#1a2a10;color:#88dd66;">⚓ 抄底訊號・大跌中法人逆勢買入</span>`
        : '';

      const has1d = s.net_1d_yi != null;
      const sign1d = has1d && s.net_1d_yi >= 0 ? '+' : '';
      const col1d = has1d && s.net_1d_yi >= 0 ? '#1D9E75' : '#D85A30';
      tt.innerHTML = `
        <div class="tt-name">${s.name}</div>
        ${has1d ? `<div class="tt-row"><span>當日法人淨買超</span><strong style="color:${col1d}">${sign1d}${s.net_1d_yi.toFixed(2)} 億</strong></div>` : ''}
        <div class="tt-row"><span>近 5 日法人淨買超</span><strong style="color:${col5}">${sign5}${s.net_5d_yi.toFixed(2)} 億</strong></div>
        <div class="tt-row"><span>近 20 日累計</span><strong style="color:${col20}">${sign20}${s.net_20d_yi.toFixed(2)} 億</strong></div>
        <div class="tt-row"><span>資金加速度</span><strong style="color:${accelCol}">${accelSign}${s.accel.toFixed(2)} 億/天（${accelLabel}）</strong></div>
        <div class="tt-row"><span>近 5 日漲跌</span><strong style="color:${s.chg_5d>=0?'#1D9E75':'#D85A30'}">${s.chg_5d>=0?'+':''}${s.chg_5d.toFixed(2)}%</strong></div>
        ${signalBadge}
        <span class="tt-status" style="background:${statusBg};color:${color};">${statusLabel(cat)}</span>
        <div class="tt-stocks">代表股：${s.stocks.join('、')}</div>
      `;
      tt.style.opacity = '1';
    });
    b.addEventListener('mousemove', e => {
      const rect = wrap.getBoundingClientRect();
      let x = e.clientX - rect.left + 16;
      let y = e.clientY - rect.top + 16;
      if (x + 280 > rect.width) x = e.clientX - rect.left - 290;
      if (y + 250 > rect.height) y = e.clientY - rect.top - 260;
      tt.style.left = x + 'px';
      tt.style.top = y + 'px';
    });
    b.addEventListener('mouseleave', () => { tt.style.opacity = '0'; });

    b.addEventListener('click', e => {
      const overlapping = getOverlappingBubbles(b, sectors);
      if (overlapping.length > 1) {
        showOverlapMenu(overlapping, sectors, e);
      } else {
        openPanel(sectors[+b.dataset.i]);
      }
    });
  });

  // ── Overlap detection ──
  function getOverlappingBubbles(targetBubble, sectors) {
    const allBubbles = Array.from(document.querySelectorAll('.bubble'));
    const visibleBubbles = allBubbles.filter(b => b.style.display !== 'none');
    const tc = targetBubble.querySelector('circle');
    if (!tc) return [targetBubble];

    const tx = parseFloat(tc.getAttribute('cx'));
    const ty = parseFloat(tc.getAttribute('cy'));
    const tr = parseFloat(tc.getAttribute('r'));

    // Get current zoom transform
    const zg = document.getElementById('zoom-group');
    const transform = zg ? zg.getAttribute('transform') || '' : '';
    let zScale = 1, zTx = 0, zTy = 0;
    const m = transform.match(/translate\(([\d.-]+),([\d.-]+)\)\s*scale\(([\d.-]+)\)/);
    if (m) { zTx = +m[1]; zTy = +m[2]; zScale = +m[3]; }

    return visibleBubbles.filter(b => {
      const c = b.querySelector('circle');
      if (!c) return false;
      const bx = parseFloat(c.getAttribute('cx'));
      const by = parseFloat(c.getAttribute('cy'));
      const br = parseFloat(c.getAttribute('r'));
      const dist = Math.hypot(tx - bx, ty - by);
      return dist < (tr + br) * 0.85;
    });
  }

  function showOverlapMenu(bubbles, sectors, e) {
    const menu = document.getElementById('overlap-menu');
    const wrap = document.getElementById('chart-wrap');
    const wrapRect = wrap.getBoundingClientRect();

    const items = bubbles.map(b => {
      const s = sectors[+b.dataset.i];
      const cat = classify(s);
      const color = COLORS[cat];
      const sign = s.net_5d_yi >= 0 ? '+' : '';
      const valColor = s.net_5d_yi >= 0 ? '#1D9E75' : '#D85A30';
      return { s, color, sign, valColor };
    }).sort((a, b) => b.s.net_5d_yi - a.s.net_5d_yi);

    menu.innerHTML = `
      <div class="overlap-menu-header">重疊板塊 · ${items.length} 個</div>
      <div class="overlap-menu-list">
        ${items.map(({ s, color, sign, valColor }) => `
          <div class="overlap-menu-item" data-name="${s.name}">
            <span class="overlap-dot" style="background:${color}"></span>
            <span class="overlap-name">${s.name}</span>
            <span class="overlap-val" style="color:${valColor}">${sign}${s.net_5d_yi.toFixed(1)}億</span>
          </div>
        `).join('')}
      </div>
    `;

    // Position: prefer below-right, flip if near edges
    const menuW = 260;
    const maxMenuH = 354; // 34px header + 320px list
    const clickX = e.clientX - wrapRect.left;
    const clickY = e.clientY - wrapRect.top;
    const spaceRight = wrapRect.width - clickX;
    const spaceBottom = wrapRect.height - clickY;
    const spaceLeft = clickX;
    const spaceTop = clickY;

    let x = spaceRight >= menuW + 12 ? clickX + 8 : clickX - menuW - 8;
    let y = spaceBottom >= maxMenuH + 12 ? clickY + 8
          : spaceTop >= maxMenuH + 12 ? clickY - Math.min(maxMenuH, spaceTop) - 8
          : Math.max(8, wrapRect.height - maxMenuH - 8);

    // Clamp within wrap
    x = Math.max(8, Math.min(x, wrapRect.width - menuW - 8));
    y = Math.max(8, Math.min(y, wrapRect.height - 60));

    menu.style.left = x + 'px';
    menu.style.top = y + 'px';
    menu.style.display = 'block';
    menu.classList.add('overlap-menu');

    // Hide tooltip
    document.getElementById('tt').style.opacity = '0';

    // Item click
    menu.querySelectorAll('.overlap-menu-item').forEach(item => {
      item.addEventListener('click', () => {
        const name = item.dataset.name;
        const sector = sectors.find(s => s.name === name);
        if (sector) openPanel(sector);
        menu.style.display = 'none';
      });
    });
  }

  // ── Ranking view ──
  function buildRanking() {
    const wrap = document.getElementById('ranking-wrap');
    const bottomCount = sectors.filter(s => s.is_bottom_fishing && SECTOR_STOCKS[s.name]).length;
    const tabsHtml = `
      <div class="ranking-tabs">
        <button class="ranking-tab ${rankingMode === 'consec' ? 'active' : ''}" data-mode="consec">🔥 連續吸金</button>
        <button class="ranking-tab ${rankingMode === 'stealth' ? 'active' : ''}" data-mode="stealth">🤫 偷偷布局</button>
        <button class="ranking-tab ${rankingMode === 'pullback' ? 'active' : ''}" data-mode="pullback">📥 短調長買</button>
        <button class="ranking-tab ${rankingMode === 'cp' ? 'active' : ''}" data-mode="cp">⚡ CP值</button>
        <button class="ranking-tab tab-bottom ${rankingMode === 'bottom' ? 'active' : ''}" data-mode="bottom">⚓ 抄底${bottomCount > 0 ? ` (${bottomCount})` : ''}</button>
      </div>
    `;

    let bodyHtml = '';
    if (rankingMode === 'cp') bodyHtml = buildCpRanking();
    else if (rankingMode === 'consec') bodyHtml = buildConsecRanking();
    else if (rankingMode === 'stealth') bodyHtml = buildStealthRanking();
    else if (rankingMode === 'pullback') bodyHtml = buildPullbackRanking();
    else bodyHtml = buildBottomRanking();

    wrap.innerHTML = tabsHtml + bodyHtml;

    // Tab clicks
    wrap.querySelectorAll('.ranking-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        rankingMode = tab.dataset.mode;
        buildRanking();
      });
    });

    // Item clicks（類股列才開面板；個股列無 data-name）
    wrap.querySelectorAll('.ranking-item[data-name]').forEach(item => {
      item.addEventListener('click', () => {
        const sector = sectors.find(x => x.name === item.dataset.name);
        if (sector) openPanel(sector);
      });
    });
    // 類股/個股 層級切換（偷偷布局/短調長買用）
    wrap.querySelectorAll('.rank-level-btn').forEach(b =>
      b.addEventListener('click', () => { rankLevel = b.dataset.lv; buildRanking(); }));
  }
  buildRankingFn = buildRanking;

  // 類股/個股 層級切換條（偷偷布局/短調長買共用）+ 個股代碼→類股 反查
  function _rankLevelBar() {
    return `<div class="rank-level"><span class="str-lbl">層級</span>
      <button class="rank-level-btn ${rankLevel === 'sector' ? 'active' : ''}" data-lv="sector">類股</button>
      <button class="rank-level-btn ${rankLevel === 'stock' ? 'active' : ''}" data-lv="stock">個股</button></div>`;
  }
  function _code2ind() {
    const m = {};
    sectors.forEach(s => (s.stocks || []).forEach(c => { if (!m[c]) m[c] = s.name; }));
    return m;
  }

  // ── 🤫 偷偷布局（法人買、沒漲、低基期 → 潛伏）──
  function buildStealthRanking() {
    const disc = `<div class="ranking-disclaimer" style="border-left-color:#3a8fd8;">🤫 法人在買、<b>還沒漲</b>(近5日漲幅&lt;3%)、<b>基期不高</b>(位階&lt;60) → 潛伏布局。依 RFI(近5日淨買÷20日均量) 排。<span style="color:#777">⚠回測上此招只在空頭靈、多頭參考用。</span></div>`;
    let items;
    if (rankLevel === 'stock') {
      const sd = lastRenderData.stock_data || {}, c2i = _code2ind();
      items = Object.entries(sd).map(([code, d]) => ({
        nm: `${code} ${d.name || ''}`, sub: c2i[code] || '—',
        net5: d.net_5d_yi || 0, chg5: d.chg_5d || 0, pos: d.pos != null ? d.pos : 50,
        rfi: d.turn20 ? (d.net_5d_yi || 0) / d.turn20 : 0
      }));
    } else {
      items = sectors.map(s => ({ nm: s.name, sub: '', name: s.name,
        net5: s.net_5d_yi || 0, chg5: s.chg_5d || 0, pos: s.position != null ? s.position : 50, rfi: s.rfi || 0 }));
    }
    items = items.filter(x => x.net5 > 0 && x.chg5 < 3 && x.pos < 60).sort((a, b) => b.rfi - a.rfi).slice(0, 15);
    if (!items.length) return disc + _rankLevelBar() + `<div class="empty-state">目前沒有符合「買+沒漲+低基期」的${rankLevel === 'stock' ? '個股' : '類股'}</div>`;
    const maxR = Math.max(0.01, ...items.map(x => x.rfi));

      <div class="ranking-col-header"><span style="min-width:22px"></span><span class="ranking-col-header-name"></span>

        const cc = x.chg5 >= 0 ? '#1D9E75' : '#D85A30', bw = Math.round(x.rfi / maxR * 100);
        return `<div class="ranking-item"${x.name ? ` data-name="${x.name}"` : ''}>
          <span class="ranking-rank">${i + 1}</span><span class="ranking-dot" style="background:#3a8fd8"></span>

          <span class="ranking-chg" style="color:${cc}">${x.chg5 >= 0 ? '+' : ''}${x.chg5.toFixed(1)}%</span>

            <div class="ranking-bar-wrap"><div class="ranking-bar-bg"><div class="ranking-bar-fill" style="width:${bw}%;background:#3a8fd8"></div></div></div></div>

  // ── 📥 短調長買（長期淨買正、近期調節 → 回檔布局點）──
  function buildPullbackRanking() {
    const disc = `<div class="ranking-disclaimer" style="border-left-color:#9b6ad8;">📥 <b>長線淨買正</b>(近20日)、<b>近5日卻在調節</b>(轉賣) → 吸了一波正回檔，常是回檔布局點(被動元件就是典型)。依近20日累計排。</div>`;

  buildRankingFn = buildRanking;

  function buildCpRanking() {
    // CP值 = net_5d_yi × (1 - chg_5d/100)：資金多、漲幅低 → 排名高
    const sorted = [...sectors]
      .filter(s => classify(s) === 'green' && SECTOR_STOCKS[s.name])
      .map(s => ({ ...s, cp: s.net_5d_yi * (1 - s.chg_5d / 100) }))
      .sort((a, b) => b.cp - a.cp);

    if (sorted.length === 0) {
      return `<div class="empty-state">目前沒有符合條件的主力板塊</div>`;
    }

    const maxCp = Math.max(...sorted.map(s => s.cp), 1);

    return `
      <div class="ranking-disclaimer">⚡ 資金大量流入但漲幅仍低的板塊排名最前——代表主力已佈局但股價還沒反應</div>
      <div class="ranking-col-header">
        <span style="min-width:22px"></span>
        <span style="width:9px"></span>
        <span class="ranking-col-header-name"></span>
        <span class="ranking-col-header-chg">5日漲跌</span>
        <span class="ranking-col-header-flow">5日淨買超(億)</span>
      </div>
      ${sorted.slice(0, 10).map((s, idx) => {
        const cat = classify(s);

        const chgSign = s.chg_5d >= 0 ? '+' : '';
        const chgColor = s.chg_5d >= 0 ? '#1D9E75' : '#D85A30';
        const flowSign = s.net_5d_yi >= 0 ? '+' : '';
        const barW = Math.round(s.cp / maxCp * 100);
        return `<div class="ranking-item" data-name="${s.name}">
          <span class="ranking-rank">${idx + 1}</span>
          <span class="ranking-dot" style="background:${color}"></span>
          <span class="ranking-name">${s.name}</span>
          <span class="ranking-chg" style="color:${chgColor}">${chgSign}${s.chg_5d.toFixed(1)}%</span>
          <div class="ranking-flow-col">
            <span class="ranking-flow" style="color:#1D9E75">${flowSign}${s.net_5d_yi.toFixed(1)}億</span>
            <div class="ranking-bar-wrap">
              <div class="ranking-bar-bg">
                <div class="ranking-bar-fill" style="width:${barW}%;background:${color}"></div>
              </div>
            </div>
          </div>
        </div>`;
      }).join('')}
    `;
  }

  // ── 連續吸金榜（依法人「連續」淨買超天數排序） ──

  // ── 強勢視圖（相對強度 RS = 個股漲跌幅 − 大盤；產業強度 + 強勢個股榜；疊資金流分真強/假強） ──
  function buildStrength() {
    const wrap = document.getElementById('strength-wrap');
    const W = strengthWin;
    const chgF = 'chg_' + W + 'd';
    const mkt = (lastRenderData['market_chg_' + W + 'd']) || 0;
    const sd = lastRenderData.stock_data || {};
    const WINS = [1, 3, 5, 10, 20, 40, 60];
    const median = arr => {
      if (!arr.length) return 0;
      const a = [...arr].sort((x, y) => x - y), m = Math.floor(a.length / 2);
      return a.length % 2 ? a[m] : (a[m - 1] + a[m]) / 2;
    };
    const tagOf = (rs, buy, pad) => rs > 0
      ? (buy ? '<span class="str-tag real">✅真強</span>' : '<span class="str-tag fake">⚡假強</span>')

    const modebar = `<div class="str-winbar">
      <span class="str-lbl">看</span>
      <button class="str-mode-btn ${strengthMode === 'industry' ? 'active' : ''}" data-m="industry">產業強度</button>
      <button class="str-mode-btn ${strengthMode === 'stock' ? 'active' : ''}" data-m="stock">強勢個股榜</button>
      ${strengthMode === 'stock' ? `<span class="str-lbl" style="margin-left:10px">顯示</span>` +
        [10, 20, 30, 50, 100].map(n => `<button class="str-n-btn ${n === strengthTopN ? 'active' : ''}" data-n="${n}">前${n}</button>`).join('') : ''}
    </div>`;
    const winbar = `<div class="str-winbar">
      <span class="str-lbl">RS 期間</span>
      ${WINS.map(w => `<button class="str-win-btn ${w === W ? 'active' : ''}" data-w="${w}">${w === 1 ? '今日' : w + '日'}</button>`).join('')}
      <span class="str-market">大盤同期 ${mkt >= 0 ? '+' : ''}${mkt.toFixed(2)}%</span>
    </div>`;

    let body = '';
    if (strengthMode === 'industry') {
      const rows = sectors.map(s => {
        const stocks = [];
        (s.stocks || []).forEach(code => {
          const d = sd[code]; if (!d) return;
          const rs = (d[chgF] || 0) - mkt;
          stocks.push({ code, name: d.name || STOCK_NAMES[code] || '', chg: d[chgF] || 0, rs, buy: (d.net_5d_yi || 0) > 0 });
        });
        stocks.sort((a, b) => b.rs - a.rs);
        return { name: s.name, indRS: median(stocks.map(x => x.rs)), n: stocks.length,
                 buyN: stocks.filter(x => x.buy).length, stocks };
      }).filter(r => r.n > 0).sort((a, b) => b.indRS - a.indRS);
      const maxAbs = Math.max(1, ...rows.map(r => Math.abs(r.indRS)));
      body = `<div class="str-list">${rows.map((r, i) => {
        const col = r.indRS >= 0 ? '#1D9E75' : '#D85A30', bw = Math.round(Math.abs(r.indRS) / maxAbs * 100);
        return `<div class="str-ind">
          <div class="str-ind-head" data-name="${r.name}">

  // ── 熱力圖（色塊地圖：單一回看期間，顏色＝淨買超強弱，跟時間下拉連動） ──

    wrap.querySelectorAll('.hm-row').forEach(row => {

  // ── Treemap view (資金集中度：方塊大小=|net20|、色=四象限、無重疊) ──
  function buildTreemap() {

    document.getElementById('win-select').addEventListener('change', (e) => {

    document.getElementById('trail-toggle').addEventListener('change', (e) => {

  // Restore view state after re-render (resize / 窗格切換 / orientation change)

// ── Squarified treemap layout → [{d, x, y, w, h}] ──
function squarify(items, total, x0, y0, w, h) {
  const out = [];
  const nodes = items.map(d => ({ d, area: d.v / total * w * h }));
  let x = x0, y = y0, dw = w, dh = h, i = 0;
  while (i < nodes.length) {
    const vertical = dw >= dh;            // 沿較短邊鋪一列，泡格較接近方形
    const side = vertical ? dh : dw;
    let row = [], rowSum = 0, bestWorst = Infinity;
    while (i < nodes.length) {
      const a = nodes[i].area;
      const newSum = rowSum + a;
      const mx = Math.max(a, ...row.map(n => n.area));
      const mn = Math.min(a, ...(row.length ? row.map(n => n.area) : [a]));
      const w2 = Math.max((side * side * mx) / (newSum * newSum), (newSum * newSum) / (side * side * mn));
      if (w2 <= bestWorst) { row.push(nodes[i]); rowSum = newSum; bestWorst = w2; i++; }
      else break;
    }
    const thick = rowSum / side || 0;
    let off = 0;
    row.forEach(n => {
      const len = n.area / thick;
      if (vertical) out.push({ d: n.d, x, y: y + off, w: thick, h: len });
      else          out.push({ d: n.d, x: x + off, y, w: len, h: thick });
      off += len;
    });
    if (vertical) { x += thick; dw -= thick; } else { y += thick; dh -= thick; }
  }
  return out;
}

// ── View switching (泡泡圖 / 熱力圖 / 樹狀圖 / 排行榜) ──
function setView(view) {
  currentView = view;
  document.getElementById('chart').style.display = view === 'chart' ? 'block' : 'none';
  document.getElementById('strength-wrap').style.display = view === 'strength' ? 'block' : 'none';  // 強勢
  document.getElementById('map-wrap').style.display = view === 'heat' ? 'block' : 'none';      // 熱力圖（色塊地圖）
  document.getElementById('heatmap-wrap').style.display = view === 'evo' ? 'block' : 'none';    // 演化矩陣
  document.getElementById('treemap-wrap').style.display = view === 'tree' ? 'block' : 'none';
  document.getElementById('ranking-wrap').style.display = view === 'rank' ? 'block' : 'none';
  // 回看期間下拉：單一期間的視圖（泡泡/熱力/樹狀）才需要；演化/排行不需
  const singleWin = (view === 'chart' || view === 'heat' || view === 'tree');
  const cc = document.getElementById('chart-controls'); if (cc) cc.style.display = singleWin ? 'flex' : 'none';
  const tc = document.getElementById('trail-ctrl'); if (tc) tc.style.display = view === 'chart' ? 'flex' : 'none';  // 軌跡只在泡泡圖
  const tn = document.getElementById('topn-ctrl'); if (tn) tn.style.display = view === 'chart' ? 'flex' : 'none';  // Top-N 只在泡泡圖
  const zh = document.querySelector('.zoom-hint'); if (zh) zh.style.display = view === 'chart' ? '' : 'none';
  const om = document.getElementById('overlap-menu'); if (om) om.style.display = 'none';
  document.getElementById('tt').style.opacity = '0';
  [['chart', 'btn-chart'], ['strength', 'btn-strength'], ['heat', 'btn-heat'], ['evo', 'btn-evo'], ['tree', 'btn-tree'], ['rank', 'btn-rank']].forEach(([v, id]) => {
    const b = document.getElementById(id); if (b) b.classList.toggle('active', v === view);
  });
  if (view === 'rank' && buildRankingFn) buildRankingFn();
  if (view === 'strength' && buildStrengthFn) buildStrengthFn();
  if (view === 'heat' && buildSectorMapFn) buildSectorMapFn();
  if (view === 'evo' && buildHeatmapFn) buildHeatmapFn();
  if (view === 'tree' && buildTreemapFn) buildTreemapFn();
}

// ── Zoom & Pan ──
function setupZoom(svgEl, onTransformChange, clampFn) {
  if (zoomAbortController) zoomAbortController.abort();
  zoomAbortController = new AbortController();
  const { signal } = zoomAbortController;

  let scale = 1, tx = 0, ty = 0;
  let dragging = false, startX = 0, startY = 0, startTx = 0, startTy = 0;
  let animRaf = null;

  function applyTransform() {
    if (clampFn) { const c = clampFn(tx, ty, scale); tx = c.tx; ty = c.ty; }
    const inner = svgEl.querySelector('#zoom-group');
    if (inner) inner.setAttribute('transform', `translate(${tx},${ty}) scale(${scale})`);
    if (onTransformChange) onTransformChange(tx, ty, scale);
  }

  function cancelAnim() {
    if (animRaf) { cancelAnimationFrame(animRaf); animRaf = null; }
  }

  function setTransform(newTx, newTy, newScale) {
    cancelAnim();
    const fromTx = tx, fromTy = ty, fromScale = scale;
    const t0 = performance.now();
    const dur = 480;
    function frame(now) {
      const t = Math.min(1, (now - t0) / dur);
      const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
      tx = fromTx + (newTx - fromTx) * ease;
      ty = fromTy + (newTy - fromTy) * ease;
      scale = fromScale + (newScale - fromScale) * ease;
      applyTransform();
      animRaf = t < 1 ? requestAnimationFrame(frame) : null;
    }
    animRaf = requestAnimationFrame(frame);
  }

  svgEl.addEventListener('wheel', e => {
    cancelAnim();
    e.preventDefault();
    const rect = svgEl.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (svgEl.viewBox.baseVal.width / rect.width);
    const my = (e.clientY - rect.top) * (svgEl.viewBox.baseVal.height / rect.height);
    const delta = e.deltaY < 0 ? 1.15 : 1 / 1.15;
    const newScale = Math.min(8, Math.max(1, scale * delta));
    tx = mx - (mx - tx) * (newScale / scale);
    ty = my - (my - ty) * (newScale / scale);
    scale = newScale;
    applyTransform();
  }, { passive: false });

  svgEl.addEventListener('mousedown', e => {
    cancelAnim();
    if (e.button !== 0) return;
    dragging = true;
    startX = e.clientX; startY = e.clientY;
    startTx = tx; startTy = ty;
    svgEl.classList.add('dragging');
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    const rect = svgEl.getBoundingClientRect();
    const scaleX = svgEl.viewBox.baseVal.width / rect.width;
    const scaleY = svgEl.viewBox.baseVal.height / rect.height;
    tx = startTx + (e.clientX - startX) * scaleX;
    ty = startTy + (e.clientY - startY) * scaleY;
    applyTransform();
  }, { signal });
  window.addEventListener('mouseup', () => { dragging = false; svgEl.classList.remove('dragging'); }, { signal });

  // Touch support
  let lastDist = 0, lastTouchX = 0, lastTouchY = 0;
  let touchMoved = false, tapTarget = null;
  let lastMidX = 0, lastMidY = 0;
  svgEl.addEventListener('touchstart', e => {
    cancelAnim();
    if (e.touches.length === 1) {
      touchMoved = false;
      tapTarget = null;
      const els = document.elementsFromPoint(e.touches[0].clientX, e.touches[0].clientY);
      for (const el of els) { const b = el.closest && el.closest('.bubble'); if (b) { tapTarget = b; break; } }
      lastTouchX = e.touches[0].clientX; lastTouchY = e.touches[0].clientY;
      startTx = tx; startTy = ty;
    } else if (e.touches.length === 2) {
      touchMoved = true;
      lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      lastMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      lastMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    }
    e.preventDefault();
  }, { passive: false });
  svgEl.addEventListener('touchmove', e => {
    const rect = svgEl.getBoundingClientRect();
    const sx2 = svgEl.viewBox.baseVal.width / rect.width;
    const sy2 = svgEl.viewBox.baseVal.height / rect.height;
    if (e.touches.length === 1) {
      const dx = e.touches[0].clientX - lastTouchX;
      const dy = e.touches[0].clientY - lastTouchY;
      if (Math.abs(dx) > 4 || Math.abs(dy) > 4) touchMoved = true;
      tx = startTx + dx * sx2;
      ty = startTy + dy * sy2;
    } else if (e.touches.length === 2) {
      const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      // Focal point in SVG space (midpoint between fingers)
      const focalX = (midX - rect.left) * sx2;
      const focalY = (midY - rect.top) * sy2;
      const newScale = Math.min(8, Math.max(1, scale * dist / (lastDist || dist)));
      // Zoom around focal point, then pan by midpoint movement
      tx = focalX - (focalX - tx) * (newScale / scale) + (midX - lastMidX) * sx2;
      ty = focalY - (focalY - ty) * (newScale / scale) + (midY - lastMidY) * sy2;
      scale = newScale;
      lastDist = dist;
      lastMidX = midX;
      lastMidY = midY;
    }
    applyTransform();
    e.preventDefault();
  }, { passive: false });
  svgEl.addEventListener('touchend', e => {
    if (e.changedTouches.length === 1 && !touchMoved && tapTarget)
      tapTarget.dispatchEvent(new MouseEvent('click', { bubbles: true, cancelable: true }));
    tapTarget = null;
  });

  return { setTransform };
}

// ── Re-render on resize / orientation change ──
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { if (lastRenderData) render(lastRenderData); }, 120);
});

// ── Fullscreen toggle ──
document.getElementById('fullscreen-btn').addEventListener('click', () => {
  const wrap = document.getElementById('chart-wrap');
  const isFs = wrap.classList.toggle('chart-fullscreen');
  document.getElementById('fullscreen-btn').textContent = isFs ? '✕' : '⛶';
  if (lastRenderData) requestAnimationFrame(() => requestAnimationFrame(() => render(lastRenderData)));
});

init();
</script>
</body>
</html>
